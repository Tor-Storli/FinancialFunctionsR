on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write
  pages: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libcurl4-openssl-dev libxml2-dev

      - name: Install R dependencies
        run: |
          install.packages(c("pkgdown", "remotes", "rmarkdown", "knitr",
                             "devtools", "desc"))
        shell: Rscript {0}

      - name: Build package
        run: R CMD build --no-manual --no-build-vignettes .

      - name: Install package
        run: |
          pkg <- list.files(".", pattern = "\\.tar\\.gz$", full.names = TRUE)[1]
          install.packages(pkg, repos = NULL, type = "source")
        shell: Rscript {0}

      - name: Build pkgdown site
        run: |
          options(pkgdown.internet = FALSE)
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install     = FALSE
          )
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean:  false
          branch: gh-pages
          folder: docs
