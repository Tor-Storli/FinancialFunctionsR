on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write
  pages: write

jobs:
  # ── Build check on macOS ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install R dependencies
        run: install.packages(c("remotes", "devtools"))
        shell: Rscript {0}

      - name: Build package
        run: R CMD build --no-manual --no-build-vignettes .

      - name: Install built package
        run: |
          pkg <- list.files(".", pattern = "\\.tar\\.gz$", full.names = TRUE)[1]
          if (is.na(pkg)) stop("No .tar.gz found — build failed!")
          cat("Installing:", pkg, "\n")
          install.packages(pkg, repos = NULL, type = "source")
          stopifnot("FinancialFunctions" %in% rownames(installed.packages()))
          cat("Install OK\n")
        shell: Rscript {0}

      - name: Verify package loads
        run: |
          library(FinancialFunctions)
          cat("Mac build OK — pmt:", pmt(0.0325/12, 180, 350000, 0, FALSE), "\n")
        shell: Rscript {0}

  # ── Build pkgdown site on Windows and deploy ──────────────────────────────
  pkgdown:
    runs-on: windows-latest
    needs: build-mac
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Rtools45
        run: |
          choco install rtools --version=4.5.0 -y
          echo "C:\rtools45\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\rtools45\x86_64-w64-mingw32.static.posix\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install R dependencies
        run: |
          install.packages(c("pkgdown", "remotes", "rmarkdown", "knitr",
                             "devtools", "desc", "roxygen2"))
        shell: Rscript {0}

      - name: Build package
        run: R CMD build --no-manual --no-build-vignettes .
        shell: cmd

      - name: Install built package
        run: |
          pkg <- list.files(".", pattern = "\\.tar\\.gz$", full.names = TRUE)
          if (length(pkg) == 0) stop("No .tar.gz found!")
          install.packages(pkg[1], repos = NULL, type = "source")
          stopifnot("FinancialFunctions" %in% rownames(installed.packages()))
          cat("Installed successfully\n")
        shell: Rscript {0}

      - name: Verify package loads
        run: |
          library(FinancialFunctions)
          cat("pmt:", pmt(0.0325/12, 180, 350000, 0, FALSE), "\n")
        shell: Rscript {0}

      - name: Build pkgdown site
        run: |
          options(pkgdown.internet = FALSE)
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install     = FALSE
          )
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean:  false
          branch: gh-pages
          folder: docs
