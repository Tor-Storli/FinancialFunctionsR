on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write
  pages: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libcurl4-openssl-dev libxml2-dev

      - name: Install R dependencies
        run: |
          install.packages(c("pkgdown", "remotes", "rmarkdown", "knitr",
                             "devtools", "desc", "roxygen2"))
        shell: Rscript {0}

      - name: Build package (no vignettes, no manual)
        run: R CMD build --no-manual --no-build-vignettes .

      - name: Install built package
        run: |
          pkg <- list.files(".", pattern = "\\.tar\\.gz$", full.names = TRUE)
          if (length(pkg) == 0) stop("No .tar.gz found!")
          cat("Installing:", pkg[1], "\n")
          install.packages(pkg[1], repos = NULL, type = "source")
          cat("Installed packages:\n")
          print(installed.packages()[, "Package"])
        shell: Rscript {0}

      - name: Verify package loads
        run: |
          library(FinancialFunctions)
          cat("Package loaded successfully\n")
          cat("pmt result:", pmt(0.0325/12, 180, 350000, 0, FALSE), "\n")
        shell: Rscript {0}

      - name: Build pkgdown site
        run: |
          options(pkgdown.internet = FALSE)
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install     = FALSE
          )
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean:  false
          branch: gh-pages
          folder: docs
