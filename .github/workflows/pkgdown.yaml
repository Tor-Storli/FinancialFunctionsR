on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build check on macOS ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install R dependencies
        run:  install.packages(c("pkgdown", "remotes", "rmarkdown", "knitr",
                       "devtools", "desc", "roxygen2", "gt", "dplyr",
                       "tibble"))
        shell: Rscript {0}

      - name: Clear Rust cache
        run: |
          if (dir.exists("src/rust/target")) {
            unlink("src/rust/target", recursive = TRUE)
            cat("Rust cache cleared\n")
          }
        shell: Rscript {0}

      - name: Build package
        run: R CMD build --no-manual --no-build-vignettes .

      - name: Install built package
        run: |
          pkg <- list.files(".", pattern = "\\.tar\\.gz$", full.names = TRUE)[1]
          if (is.na(pkg)) stop("No .tar.gz found — build failed!")
          install.packages(pkg, repos = NULL, type = "source")
          stopifnot("FinancialFunctions" %in% rownames(installed.packages()))
          cat("Install OK\n")
        shell: Rscript {0}

      - name: Verify package loads
        run: |
          library(FinancialFunctions)
          cat("Mac build OK — pmt:", pmt(0.0325/12, 180, 350000, 0, FALSE), "\n")
        shell: Rscript {0}

  # ── Build pkgdown site on Windows ────────────────────────────────────────
  build-site:
    runs-on: windows-2022
    needs: build-mac
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          rtools-version: '44'

      - name: Install Rust with GNU target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install R dependencies
        run:  install.packages(c("pkgdown", "remotes", "rmarkdown", "knitr",
                       "devtools", "desc", "roxygen2", "gt", "dplyr",
                       "tibble"))
        shell: Rscript {0}

      - name: Clear Rust cache
        run: |
          if (dir.exists("src/rust/target")) {
            unlink("src/rust/target", recursive = TRUE)
            cat("Rust cache cleared\n")
          }
        shell: Rscript {0}

      - name: Build package
        run: R CMD build --no-manual --no-build-vignettes .
        shell: cmd

      - name: Install built package
        run: |
          pkg <- list.files(".", pattern = "\\.tar\\.gz$", full.names = TRUE)
          if (length(pkg) == 0) stop("No .tar.gz found!")
          install.packages(pkg[1], repos = NULL, type = "source")
          stopifnot("FinancialFunctions" %in% rownames(installed.packages()))
          cat("Installed successfully\n")
        shell: Rscript {0}

      - name: Verify package loads
        run: |
          library(FinancialFunctions)
          cat("pmt:", pmt(0.0325/12, 180, 350000, 0, FALSE), "\n")
        shell: Rscript {0}

      - name: Build pkgdown site
        run: |
          options(pkgdown.internet = FALSE)
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install     = FALSE
          )
        shell: Rscript {0}

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgdown-site
          path: docs/
          retention-days: 1

  # ── Deploy to GitHub Pages from Ubuntu ───────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-site
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: pkgdown-site
          path: docs/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
